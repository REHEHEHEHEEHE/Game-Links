<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neo Arcade</title>
<style>
  body {
    background: #0b0e14; 
    color: #00f0ff;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding: 20px;
    margin: 0;
  }
  h1 { 
    color: #ff0055; 
    text-shadow: 0 0 10px #ff0055;
    font-size: 32px;
    letter-spacing: 2px;
  }
  .game-box {
    background: #151a24; 
    max-width: 360px; 
    margin: 20px auto; 
    padding: 20px;
    border-radius: 12px; 
    border: 1px solid #ff0055;
    box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); 
  }
  .game-title { 
    font-size: 22px; 
    color: #fff;
    margin: 0 0 5px 0; 
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
  }
  .game-description { 
    font-size: 13px; 
    color: #8a99ad; 
    margin-bottom: 15px; 
  }
  .play-btn {
    display: inline-block;
    background: #00f0ff; 
    color: #0b0e14;
    padding: 10px 20px;
    text-decoration: none; 
    border-radius: 6px;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    transition: 0.2s;
  }
  .play-btn:hover {
    background: #ff0055;
    color: #fff;
    box-shadow: 0 0 15px #ff0055;
  }
  .left-side-box {
    position: fixed; 
    left: 15px; 
    top: 100px; 
    width: 240px; 
    background: #151a24; 
    padding: 15px;
    border-radius: 12px; 
    border: 1px solid #00f0ff;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    text-align: left; 
    z-index: 100; 
    max-height: 500px;
    overflow-y: auto;
  }
  .right-side-box {
    position: fixed; 
    right: 15px; 
    top: 100px; 
    width: 200px; 
    background: #151a24; 
    padding: 15px;
    border-radius: 12px; 
    border: 1px solid #00f0ff;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    text-align: left; 
    z-index: 100; 
  }
  .admin-section-title {
    font-size: 11px;
    color: #00f0ff;
    margin: 15px 0 5px 0;
    letter-spacing: 1px;
    border-bottom: 1px dashed #222c3d;
    padding-bottom: 3px;
  }
  .admin-user-row {
    font-size: 12px;
    margin-bottom: 8px;
    border-bottom: 1px solid #222c3d;
    padding-bottom: 5px;
    color: #fff;
  }
  .admin-btn {
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-weight: bold;
    margin-top: 5px;
  }
  .counter-box {
    margin: 30px auto;
    background: #151a24;
    max-width: 160px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ff0055;
    box-shadow: 0 0 10px rgba(255, 0, 85, 0.1);
  }
</style>
</head>
<body>
