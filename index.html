<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Arcade v2</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.panel{
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.game{
    background:#222;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.game a{
    color:white;
    text-decoration:none;
}
</style>
</head>
<body>

<h1>Neo Arcade v2</h1>

<div id="authPanel" class="panel">

<h2>Register</h2>

<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="userPanel" class="panel" style="display:none;">

<h2 id="welcome"></h2>

<button onclick="logout()">Logout</button>

<div id="adminBadge" style="display:none;">
    <h3>Administrator</h3>
</div>

<div class="game-grid">

<div class="game">
<h3>Cuphead</h3>
</div>

<div class="game">
<h3>Celeste</h3>
</div>

<div class="game">
<h3>Minecraft</h3>
</div>

<div class="game">
<h3>Terraria</h3>
</div>

<div class="game">
<h3>Deltarune</h3>
</div>

<div class="game">
<h3>Hollow Knight</h3>
</div>

<div class="game">
<h3><a href="https://kosmikau.github.io/" target="_blank">Kosmik's Site</a></h3>
</div>

</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
    "https://xendlckjbpqllbfzmouj.supabase.co",
    "sb_publishable_Twcn4S7CVpv-WHCz063wcg_wvQPyKkB"
);

window.register = async () => {

    const username =
        document.getElementById("regUsername").value.trim();

    const email =
        document.getElementById("regEmail").value.trim();

    const password =
        document.getElementById("regPassword").value;

    if(!username || !email || !password){
        alert("Please fill in all fields.");
        return;
    }

    const { data, error } =
        await supabase.auth.signUp({
            email,
            password
        });

    if(error){
        alert(error.message);
        return;
    }

    const userId = data.user.id;

    const { error: profileError } =
        await supabase
            .from("profiles")
            .insert({
                id:userId,
                username:username,
                email:email,
                role:"player",
                is_banned:false
            });

    if(profileError){
        alert(profileError.message);
        return;
    }

    alert("Account created successfully.");
};

window.login = async () => {

    const username =
        document.getElementById("loginUsername").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    const { data: profile, error: profileError } =
        await supabase
            .from("profiles")
            .select("*")
            .eq("username", username)
            .single();

    if(profileError || !profile){
        alert("Username not found.");
        return;
    }

    const { error } =
        await supabase.auth.signInWithPassword({
            email: profile.email,
            password
        });

    if(error){
        alert(error.message);
        return;
    }

    await loadUser();
};

window.logout = async () => {

    await supabase.auth.signOut();

    location.reload();
};

async function loadUser(){

    const { data } =
        await supabase.auth.getUser();

    const user = data.user;

    if(!user) return;

    const { data: profile, error } =
        await supabase
            .from("profiles")
            .select("*")
            .eq("id", user.id)
            .single();

    if(error || !profile){
        console.error(error);
        return;
    }

    if(profile.is_banned){

        alert("This account has been banned.");

        await supabase.auth.signOut();

        location.reload();

        return;
    }

    document.getElementById("welcome").innerHTML =
        `Welcome ${profile.username}<br>Role: ${profile.role}`;

    document.getElementById("authPanel").style.display = "none";
    document.getElementById("userPanel").style.display = "block";

    if(profile.role === "admin"){
        document.getElementById("adminBadge").style.display = "block";
    }
}

const {
    data:{session}
} = await supabase.auth.getSession();

if(session){
    await loadUser();
}
</script>

</body>
</html>
